<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>llm diff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg-base: #0a0a0a;
      --bg-surface: #111111;
      --bg-elevated: #1a1a1a;
      --border: #1f1f1f;
      --accent-green: #00ff88;
      --accent-red: #ff4444;
      --accent-yellow: #ffcc00;
      --text-primary: #f0f0f0;
      --text-secondary: #888888;
      --text-tertiary: #444444;
      --font-ui: 'IBM Plex Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; background: var(--bg-base); color: var(--text-primary); font-family: var(--font-ui); }
    body { overflow: hidden; }

    /* Layout */
    .layout { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }

    /* Sidebar */
    .sidebar { background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); }
    .sidebar-logo { font-family: var(--font-mono); font-size: 13px; color: var(--accent-green); letter-spacing: 0.05em; }
    .sidebar-tagline { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
    .new-run-btn { margin: 12px 16px; padding: 8px 12px; background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-primary); font-family: var(--font-ui); font-size: 12px; cursor: pointer; border-radius: 4px; width: calc(100% - 32px); text-align: left; transition: border-color 0.15s; }
    .new-run-btn:hover { border-color: var(--accent-green); color: var(--accent-green); }
    .run-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .run-item { padding: 10px 16px; cursor: pointer; border-left: 2px solid transparent; transition: background 0.15s; }
    .run-item:hover { background: var(--bg-elevated); }
    .run-item.active { border-left-color: var(--accent-green); background: var(--bg-elevated); }
    .run-item-id { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .run-item-ts { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
    .run-item-badges { display: flex; gap: 6px; margin-top: 4px; }
    .badge { font-family: var(--font-mono); font-size: 10px; padding: 1px 5px; border-radius: 3px; }
    .badge-green { background: rgba(0,255,136,0.1); color: var(--accent-green); }
    .badge-red { background: rgba(255,68,68,0.1); color: var(--accent-red); }
    .badge-gray { background: rgba(255,255,255,0.05); color: var(--text-secondary); }
    .live-indicator { display: flex; align-items: center; gap: 6px; padding: 10px 16px; font-size: 11px; color: var(--accent-green); }
    .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-green); animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* Main */
    .main { display: flex; flex-direction: column; overflow: hidden; }
    .main-top { flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column; border-bottom: 1px solid var(--border); }
    .main-bottom { height: 220px; padding: 16px 24px; }

    /* Empty state */
    .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
    .empty-title { font-family: var(--font-mono); font-size: 16px; color: var(--text-secondary); }
    .empty-sub { font-family: var(--font-mono); font-size: 12px; color: var(--text-tertiary); }

    /* Tabs */
    .tabs-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); overflow-x: auto; padding: 0 24px; background: var(--bg-surface); flex-shrink: 0; }
    .tabs-bar::-webkit-scrollbar { height: 4px; } .tabs-bar::-webkit-scrollbar-thumb { background: var(--border); }
    .tab { padding: 10px 16px; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-secondary); white-space: nowrap; transition: color 0.15s; }
    .tab:hover { color: var(--text-primary); }
    .tab.active { color: var(--text-primary); border-bottom-color: var(--accent-green); }

    /* Test case view */
    .tc-view { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .tc-outputs { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: start; margin-bottom: 20px; }
    .output-col { display: flex; flex-direction: column; gap: 6px; }
    .output-label { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
    .output-box { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 4px; padding: 12px; font-family: var(--font-mono); font-size: 11px; line-height: 1.6; max-height: 220px; overflow-y: auto; color: var(--text-primary); white-space: pre-wrap; word-break: break-word; }
    .verdict-center { display: flex; align-items: center; justify-content: center; padding-top: 22px; }
    .verdict-badge { font-size: 20px; padding: 6px; }

    /* Criteria table */
    .criteria-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .criteria-table th { text-align: left; padding: 6px 10px; color: var(--text-tertiary); font-weight: 500; border-bottom: 1px solid var(--border); }
    .criteria-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .criteria-table tr:last-child td { border-bottom: none; }
    .cr-improved { color: var(--accent-green); }
    .cr-regressed { color: var(--accent-red); }
    .cr-neutral { color: var(--text-secondary); }

    /* Chart */
    .chart-title { font-size: 11px; color: var(--text-secondary); margin-bottom: 10px; }

    /* Live run view */
    .live-view { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .live-progress { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
    .live-progress-bar { height: 100%; background: var(--accent-green); transition: width 0.4s ease; }
    .live-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 4px; padding: 14px; margin-bottom: 12px; animation: fadeSlide 0.25s ease; }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .live-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .live-card-id { font-family: var(--font-mono); font-size: 12px; }
    .live-outputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .live-output { font-family: var(--font-mono); font-size: 10px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 3px; padding: 8px; max-height: 80px; overflow: hidden; color: var(--text-secondary); white-space: pre-wrap; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 6px; padding: 24px; width: 420px; }
    .modal-title { font-family: var(--font-mono); font-size: 13px; color: var(--accent-green); margin-bottom: 16px; }
    .modal-input { width: 100%; background: var(--bg-base); border: 1px solid var(--border); color: var(--text-primary); font-family: var(--font-mono); font-size: 12px; padding: 8px 12px; border-radius: 4px; outline: none; }
    .modal-input:focus { border-color: var(--accent-green); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .btn { padding: 7px 16px; border-radius: 4px; font-size: 12px; cursor: pointer; font-family: var(--font-ui); border: 1px solid var(--border); }
    .btn-primary { background: var(--accent-green); color: #000; border-color: var(--accent-green); font-weight: 600; }
    .btn-ghost { background: transparent; color: var(--text-secondary); }

    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

function relativeTime(ts) {
  const diff = (Date.now() - new Date(ts).getTime()) / 1000;
  if (diff < 60) return `${Math.floor(diff)}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function verdictIcon(v) {
  if (v === 'improved') return '✅';
  if (v === 'regressed') return '❌';
  return '➡';
}

function deltaFmt(d) {
  return (d >= 0 ? '+' : '') + d.toFixed(2);
}

// ── Trend Chart ───────────────────────────────────────────────────────────────
function TrendChart({ runs }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current) return;
    const sorted = [...runs].reverse();
    const labels = sorted.map(r => {
      const d = new Date(r.timestamp);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    });
    const data = sorted.map(r => r.summary.score_delta_avg ?? 0);

    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data,
          borderColor: '#ffffff',
          borderWidth: 2,
          pointBackgroundColor: data.map(v => v > 0 ? '#00ff88' : v < 0 ? '#ff4444' : '#666'),
          pointRadius: 4,
          tension: 0.3,
          fill: {
            target: { value: 0 },
            above: 'rgba(0,255,136,0.12)',
            below: 'rgba(255,68,68,0.12)',
          },
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1a1a',
            borderColor: '#1f1f1f',
            borderWidth: 1,
            titleColor: '#888',
            bodyColor: '#f0f0f0',
            callbacks: {
              title: (items) => sorted[items[0].dataIndex]?.run_id ?? '',
              label: (item) => {
                const s = sorted[item.dataIndex]?.summary;
                if (!s) return '';
                return [`avg delta: ${deltaFmt(item.raw)}`, `↑${s.improved} ↓${s.regressed} →${s.neutral}`];
              }
            }
          }
        },
        scales: {
          x: { ticks: { color: '#555', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: '#1a1a1a' } },
          y: {
            min: -1, max: 1,
            ticks: { color: '#555', font: { family: 'JetBrains Mono', size: 10 } },
            grid: { color: (ctx) => ctx.tick.value === 0 ? '#333' : '#1a1a1a' }
          }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [runs]);

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
      <div className="chart-title">Score delta over time</div>
      <div style={{ flex: 1, position: 'relative' }}>
        <canvas ref={canvasRef} />
      </div>
    </div>
  );
}

// ── Criteria table ────────────────────────────────────────────────────────────
function CriteriaTable({ criteria }) {
  return (
    <table className="criteria-table">
      <thead>
        <tr>
          <th>Criterion</th>
          <th style={{width:60}}>V1</th>
          <th style={{width:60}}>V2</th>
          <th style={{width:60}}>Delta</th>
          <th style={{width:80}}>Verdict</th>
        </tr>
      </thead>
      <tbody>
        {criteria.map((cr, i) => {
          const cls = cr.verdict === 'improved' ? 'cr-improved' : cr.verdict === 'regressed' ? 'cr-regressed' : 'cr-neutral';
          return (
            <tr key={i}>
              <td>{cr.criterion}</td>
              <td className={cls}>{cr.score_v1.toFixed(1)}</td>
              <td className={cls}>{cr.score_v2.toFixed(1)}</td>
              <td className={cls}>{deltaFmt(cr.delta)}</td>
              <td className={cls}>{verdictIcon(cr.verdict)} {cr.verdict}</td>
            </tr>
          );
        })}
      </tbody>
    </table>
  );
}

// ── Test case browser ─────────────────────────────────────────────────────────
function TestCaseBrowser({ run }) {
  const [activeTab, setActiveTab] = useState(0);
  if (!run?.test_cases?.length) return null;
  const tc = run.test_cases[activeTab];

  return (
    <>
      <div className="tabs-bar">
        {run.test_cases.map((t, i) => (
          <div key={t.id} className={`tab ${i === activeTab ? 'active' : ''}`} onClick={() => setActiveTab(i)}>
            {verdictIcon(t.overall_verdict)} {t.id}
          </div>
        ))}
      </div>
      <div className="tc-view">
        <div className="tc-outputs">
          <div className="output-col">
            <div className="output-label">Prompt v1</div>
            <div className="output-box">{tc.output_v1}</div>
          </div>
          <div className="verdict-center">
            <div className="verdict-badge">{verdictIcon(tc.overall_verdict)}</div>
          </div>
          <div className="output-col">
            <div className="output-label">Prompt v2</div>
            <div className="output-box">{tc.output_v2}</div>
          </div>
        </div>
        {tc.criteria_results?.length > 0 && <CriteriaTable criteria={tc.criteria_results} />}
      </div>
    </>
  );
}

// ── Live run view ─────────────────────────────────────────────────────────────
function LiveRunView({ liveCards, total }) {
  const pct = total > 0 ? (liveCards.length / total) * 100 : 0;
  return (
    <div className="live-view">
      <div className="live-progress">
        <div className="live-progress-bar" style={{ width: `${pct}%` }} />
      </div>
      {liveCards.map((tc) => (
        <div key={tc.id} className="live-card">
          <div className="live-card-header">
            <span>{verdictIcon(tc.overall_verdict)}</span>
            <span className="live-card-id">{tc.id}</span>
            <span style={{ fontSize: 11, color: 'var(--text-secondary)', marginLeft: 'auto' }}>{tc.overall_verdict}</span>
          </div>
          <div className="live-outputs">
            <div className="live-output">v1: {tc.output_v1?.slice(0, 200)}</div>
            <div className="live-output">v2: {tc.output_v2?.slice(0, 200)}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── New run modal ─────────────────────────────────────────────────────────────
function NewRunModal({ onClose, onStart }) {
  const [path, setPath] = useState('examples/rag_pipeline.yaml');
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-title">new run</div>
        <input
          className="modal-input"
          value={path}
          onChange={e => setPath(e.target.value)}
          placeholder="path/to/tests.yaml"
          autoFocus
          onKeyDown={e => e.key === 'Enter' && onStart(path)}
        />
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={() => onStart(path)}>Run</button>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [runs, setRuns] = useState([]);
  const [selectedRunId, setSelectedRunId] = useState(null);
  const [selectedRun, setSelectedRun] = useState(null);
  const [showModal, setShowModal] = useState(false);
  const [isLive, setIsLive] = useState(false);
  const [liveCards, setLiveCards] = useState([]);
  const [liveTotal, setLiveTotal] = useState(0);
  const esRef = useRef(null);

  const fetchRuns = useCallback(async () => {
    try {
      const res = await fetch('/api/runs');
      const data = await res.json();
      setRuns(data);
    } catch {}
  }, []);

  useEffect(() => { fetchRuns(); }, [fetchRuns]);

  const selectRun = useCallback(async (runId) => {
    setSelectedRunId(runId);
    try {
      const res = await fetch(`/api/runs/${runId}`);
      const data = await res.json();
      setSelectedRun(data);
    } catch {}
  }, []);

  useEffect(() => {
    if (!selectedRunId && runs.length > 0) {
      selectRun(runs[0].run_id);
    }
  }, [runs, selectedRunId, selectRun]);

  const startRun = useCallback((yamlFile) => {
    setShowModal(false);
    setIsLive(true);
    setLiveCards([]);
    setLiveTotal(0);

    if (esRef.current) esRef.current.abort();

    fetch('/api/runs/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ yaml_file: yamlFile }),
    }).then(res => {
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      function pump() {
        reader.read().then(({ done, value }) => {
          if (done) return;
          buf += decoder.decode(value, { stream: true });
          const parts = buf.split('\n\n');
          buf = parts.pop();
          for (const part of parts) {
            const eventMatch = part.match(/event:\s*(\w+)/);
            const dataMatch = part.match(/data:\s*(.+)/s);
            if (!eventMatch || !dataMatch) continue;
            const event = eventMatch[1];
            const data = JSON.parse(dataMatch[1]);
            if (event === 'start') { setLiveTotal(data.total); }
            else if (event === 'result') { setLiveCards(prev => [...prev, data]); }
            else if (event === 'done') {
              setIsLive(false);
              fetchRuns().then(() => {
                selectRun(selectedRunId); // refresh
              });
            }
          }
          pump();
        });
      }
      pump();
    }).catch(() => setIsLive(false));
  }, [fetchRuns, selectRun, selectedRunId]);

  return (
    <div className="layout">
      {/* Sidebar */}
      <aside className="sidebar">
        <div className="sidebar-header">
          <div className="sidebar-logo">llm diff</div>
          <div className="sidebar-tagline">prompt regression testing</div>
        </div>
        <button className="new-run-btn" onClick={() => setShowModal(true)}>+ new run</button>
        <div className="run-list">
          {isLive && (
            <div className="live-indicator">
              <div className="pulse" />
              Running...
            </div>
          )}
          {runs.map(r => (
            <div
              key={r.run_id}
              className={`run-item ${r.run_id === selectedRunId ? 'active' : ''}`}
              onClick={() => selectRun(r.run_id)}
            >
              <div className="run-item-id">{r.run_id}</div>
              <div className="run-item-ts">{relativeTime(r.timestamp)}</div>
              <div className="run-item-badges">
                <span className="badge badge-green">↑{r.summary.improved}</span>
                <span className="badge badge-red">↓{r.summary.regressed}</span>
                <span className="badge badge-gray">→{r.summary.neutral}</span>
              </div>
            </div>
          ))}
        </div>
      </aside>

      {/* Main */}
      <main className="main">
        <div className="main-top">
          {isLive ? (
            <LiveRunView liveCards={liveCards} total={liveTotal} />
          ) : selectedRun ? (
            <TestCaseBrowser run={selectedRun} />
          ) : (
            <div className="empty">
              <div className="empty-title">No runs yet</div>
              <div className="empty-sub">Run `llmdiff compare your_tests.yaml` to get started</div>
            </div>
          )}
        </div>
        <div className="main-bottom">
          <TrendChart runs={runs} />
        </div>
      </main>

      {showModal && <NewRunModal onClose={() => setShowModal(false)} onStart={startRun} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
